<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#48c6ef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" fill="url(#bg)" rx="12"/>

  <!-- Terminal window chrome -->
  <rect x="20" y="20" width="760" height="120" rx="8" fill="#0a0a14" stroke="#2a2a4a" stroke-width="1.5"/>
  <rect x="20" y="20" width="760" height="32" rx="8" fill="#141428" stroke="#2a2a4a" stroke-width="1.5"/>
  <rect x="20" y="36" width="760" height="16" fill="#141428"/>

  <!-- Window dots -->
  <circle cx="42" cy="36" r="6" fill="#ff5f56"/>
  <circle cx="62" cy="36" r="6" fill="#ffbd2e"/>
  <circle cx="82" cy="36" r="6" fill="#27c93f"/>

  <!-- Window title -->
  <text x="400" y="40" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#888" text-anchor="middle" dominant-baseline="middle">xso25@github — zsh</text>

  <!-- Prompt line -->
  <text x="40" y="78" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="20" fill="#64ffda" dominant-baseline="middle">❯</text>
  <text x="62" y="78" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="20" fill="#e0e0e0" dominant-baseline="middle">abdulrahman nader</text>

  <!-- Tagline -->
  <text x="62" y="108" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#666" dominant-baseline="middle">backend</text>
  <text x="142" y="108" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#444" dominant-baseline="middle">·</text>
  <text x="156" y="108" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#666" dominant-baseline="middle">systems</text>
  <text x="236" y="108" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#444" dominant-baseline="middle">·</text>
  <text x="250" y="108" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#666" dominant-baseline="middle">cairo, egypt</text>

  <!-- Blinking cursor -->
  <rect x="340" y="68" width="3" height="18" fill="#64ffda">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
